<div class="loading">
    <div class="loader-rose">
        <svg viewBox="0 0 100 100" fill="none" aria-hidden="true">
            <g id="rose-group">
                <path id="rose-path" stroke="currentColor"
                      stroke-linecap="round" stroke-linejoin="round" opacity="0.12"></path>
            </g>
        </svg>
    </div>
</div>

<style>
    .loading {
        position: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 99;
        background-color: var(--body-background, #121212);
    }

    .loader-rose {
        width: min(40vmin, 180px);
        aspect-ratio: 1;
        color: #c9b8d8;
        animation: roseColorShift 4s ease-in-out infinite;
    }

    .loader-rose svg {
        width: 100%;
        height: 100%;
        overflow: visible;
        filter: drop-shadow(0 0 7px currentColor);
    }

    @keyframes roseColorShift {
        0%   { color: #c9b8d8; }
        25%  { color: #f0a0c0; }
        50%  { color: #8ab4f8; }
        75%  { color: #c0a0e8; }
        100% { color: #c9b8d8; }
    }

    .scaleAndFadeout {
        animation: scaleAndFadeOut 0.7s forwards;
    }

    @keyframes scaleAndFadeOut {
        0%   { transform: scale(1);   opacity: 1; }
        100% { transform: scale(1.3); opacity: 0; }
    }
</style>

<script>
    (function () {
        const SVG_NS = 'http://www.w3.org/2000/svg';
        const cfg = {
            particleCount: 76,
            trailSpan: 0.31,
            durationMs: 5300,
            rotationDurationMs: 28000,
            pulseDurationMs: 4400,
            strokeWidth: 4.6,
            roseA: 9.2,
            roseABoost: 0.6,
            roseBreathBase: 0.72,
            roseBreathBoost: 0.28,
            roseScale: 3.25,
        };

        function point(progress, s) {
            const t = progress * Math.PI * 2;
            const a = cfg.roseA + s * cfg.roseABoost;
            const r = a * (cfg.roseBreathBase + s * cfg.roseBreathBoost) * Math.cos(3 * t);
            return { x: 50 + Math.cos(t) * r * cfg.roseScale, y: 50 + Math.sin(t) * r * cfg.roseScale };
        }

        function normalizeProgress(p) { return ((p % 1) + 1) % 1; }

        function getDetailScale(time) {
            const angle = (time % cfg.pulseDurationMs) / cfg.pulseDurationMs * Math.PI * 2;
            return 0.52 + ((Math.sin(angle + 0.55) + 1) / 2) * 0.48;
        }

        function buildPath(s, steps = 240) {
            return Array.from({ length: steps + 1 }, (_, i) => {
                const p = point(i / steps, s);
                return `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(2)} ${p.y.toFixed(2)}`;
            }).join(' ');
        }

        const group = document.getElementById('rose-group');
        const rosePath = document.getElementById('rose-path');
        rosePath.setAttribute('stroke-width', String(cfg.strokeWidth));

        const particles = Array.from({ length: cfg.particleCount }, () => {
            const c = document.createElementNS(SVG_NS, 'circle');
            c.setAttribute('fill', 'currentColor');
            group.appendChild(c);
            return c;
        });

        const startedAt = performance.now();
        let roseRafId;

        function render(now) {
            const time = now - startedAt;
            const progress = (time % cfg.durationMs) / cfg.durationMs;
            const s = getDetailScale(time);
            const rot = -((time % cfg.rotationDurationMs) / cfg.rotationDurationMs) * 360;

            group.setAttribute('transform', `rotate(${rot} 50 50)`);
            rosePath.setAttribute('d', buildPath(s));

            particles.forEach((node, i) => {
                const tailOffset = i / (cfg.particleCount - 1);
                const p = point(normalizeProgress(progress - tailOffset * cfg.trailSpan), s);
                const fade = Math.pow(1 - tailOffset, 0.56);
                node.setAttribute('cx', p.x.toFixed(2));
                node.setAttribute('cy', p.y.toFixed(2));
                node.setAttribute('r',  (0.9 + fade * 2.7).toFixed(2));
                node.setAttribute('opacity', (0.04 + fade * 0.96).toFixed(3));
            });

            roseRafId = requestAnimationFrame(render);
        }

        roseRafId = requestAnimationFrame(render);

        function loadFinish() {
            cancelAnimationFrame(roseRafId);
            document.querySelector('.loading').classList.add('scaleAndFadeout');
        }

        const MIN_DISPLAY_MS = 800;

        function initLoading() {
            const loading = document.querySelector('.loading');
            window.addEventListener('load', function () {
                const elapsed = performance.now() - startedAt;
                const wait = Math.max(0, MIN_DISPLAY_MS - elapsed);
                setTimeout(() => {
                    loadFinish();
                    setTimeout(() => { loading.style.display = 'none'; }, 1500);
                }, wait);
            });
        }

        initLoading();
    })();
</script>
