<script src="https://cdn.jsdelivr.net/npm/pjax/pjax.min.js"></script>
<script>
    var pjax = new Pjax({
        selectors: [".main-container"],
        cacheBust: false
    })
</script>

<script>
    pjax._handleResponse = pjax.handleResponse;
    pjax.handleResponse = function(responseText, request, href, options) {
        if (request.responseText.match("<html")) {
            if (responseText) {
                // 将新页面的html字符串解析成DOM对象
                let newDom = new DOMParser().parseFromString(responseText, 'text/html');
                // 获取新页面中body的className，并设置回当前页面
                let bodyClass = newDom.body.className;
                document.body.setAttribute("class", bodyClass)
            }
            // 放行，交给pjax自己处理
            pjax._handleResponse(responseText, request, href, options);
        } else {
            // handle non-HTML response here
        }
    }
</script>



<script>
  const cdnPath = "https://cdn.jsdelivr.net/gh/skyhaibara/hugo-live2d@master";
  const cssPath = {{ (resources.Get "waifu/waifu.css").Permalink }};
  const tipsJsonPath = {{ (resources.Get "waifu/waifu-tips.json").Permalink }};
  const config = {
    // 资源路径
    path: {
      homePath: "/",
      modelPath: cdnPath + "/Resources/",
      tipsJsPath: cdnPath + "/waifu-tips.js",
      live2dCorePath: cdnPath + "/Core/live2dcubismcore.js",
      live2dSdkPath: cdnPath + "/live2d-sdk.js"
    },
    // 工具栏
    tools: ["hitokoto", "express", "switch-model", "photo" , "info", "quit"],
    // 模型拖拽
    drag: {
      enable: true,
      direction: ["x"]
    },
  }
  // 加载资源并初始化
  if (screen.width >= 768) {
    Promise.all([
      loadExternalResource(cssPath, "css"),
      loadExternalResource(config.path.live2dCorePath, "js"),
      loadExternalResource(config.path.live2dSdkPath, "js"),
      loadExternalResource(config.path.tipsJsPath, "js")
    ]).then(() => {
      initWidget({
        waifuPath: tipsJsonPath,
        cdnPath: config.path.modelPath,
        tools: config.tools,
        dragEnable: config.drag.enable,
        dragDirection: config.drag.direction,
        switchType: config.switchType
      });
    });
  }
  // 异步加载资源
  function loadExternalResource(url, type) {
    return new Promise((resolve, reject) => {
      let tag;
      if (type === "css") {
        tag = document.createElement("link");
        tag.rel = "stylesheet";
        tag.href = url;
      }
      else if (type === "js") {
        tag = document.createElement("script");
        tag.src = url;
      }
      if (tag) {
        tag.onload = () => resolve(url);
        tag.onerror = () => reject(url);
        document.head.appendChild(tag);
      }
    });
  }
</script>

<style>
  #TableOfContents > ul, ol {
      ul, ol {
          display: none;
      }
      .open {
          display: block;
      }
  }
</style>

<script>
    function initTocHide() {
        // 判断是否存在文章目录
        let toc = document.querySelector(".widget--toc");
        if (!toc) {
            return;
        }
        // 监听滚动
        window.addEventListener('scroll', function() {
            //清除class值
            let openUl = document.querySelectorAll(".open");
            if (openUl.length > 0) {
              openUl.forEach((ul) => {
                ul.classList.remove("open")
              })
            }
            // 获取active-class
            let currentLi = document.querySelector(".active-class");
            if (!currentLi) {
                return
            }
            // 展示子ul
            if (currentLi.children.length > 1) {
                currentLi.children[1].classList.add("open")
            }
            // 展示父ul
            let ul = currentLi.parentElement;
            do {
                ul.classList.add("open");
                ul = ul.parentElement.parentElement
            } while (ul !== undefined && (ul.localName === 'ul' || ul.localName === 'ol'))
        });
    }
    initTocHide()
</script>

<style>
    #backTopBtn {
        display: none;
        position: fixed;
        bottom: 30px;
        z-index: 99;
        cursor: pointer;
        width: 24px;
        height: 24px;

</style>

<script>
    /**
     * 滚动回顶部初始化
     */
    function initScrollTop() {
        let rightSideBar = document.querySelector(".right-sidebar");
        if (!rightSideBar) {
            return;
        }
        // 添加返回顶部按钮到右侧边栏
        let btn = document.createElement("div");
        btn.id = "backTopBtn";
        btn.onclick = backToTop
        rightSideBar.appendChild(btn)
        // 滚动监听
        window.addEventListener('scroll', function() {
            // 当网页向下滑动 20px 出现"返回顶部" 按钮
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        });
    }

    function backToTop(){
        window.scrollTo({ top: 0, behavior: "smooth" })
    }

    initScrollTop();
</script>

<style>
/* 代码块容器：默认折叠，但带平滑动画 */
.highlight {
    max-height: 200px;
    overflow: hidden;
    position: relative;
    transition: max-height .35s ease;
}

/* 展开状态：自然展开，不硬切 */
.highlight.code-show {
    max-height: 2000px; /* 防止高度过大，但足够展开 */
}

/* 渐隐区域：主题自适应 */
.code-more-box {
    width: 100%;
    padding-top: 36px;
    position: absolute;
    left: 0;
    bottom: 0;
    text-align: center;
    cursor: pointer;
    transition: opacity .3s ease;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0),
        var(--body-background)
    );
    border-bottom-left-radius: inherit;
    border-bottom-right-radius: inherit;
}

/* 按钮 */
.code-more-btn {
    width: 48px;
    height: 28px;
    background: var(--card-background);
    border-radius: 8px 8px 0 0;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto;
    transition: all .25s ease;
}

.code-more-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-l1);
}

/* 图片 */
.code-more-img {
    width: 20px;
    height: 20px;
    display: block;
}

/* 动画结束 */
.code-more-box.hide {
    opacity: 0;
    pointer-events: none;
}
</style>

<script>
function initCodeMoreBox() {
    const codeBlocks = document.querySelectorAll(".highlight");

    codeBlocks.forEach(block => {
        // 内容不够长，不需要折叠
        if (block.scrollHeight <= 400) return;

        // 避免重复初始化
        if (block.classList.contains("code-more-init")) return;
        block.classList.add("code-more-init");

        // 展开盒子
        const moreBox = document.createElement("div");
        moreBox.className = "code-more-box";

        // 按钮
        const btn = document.createElement("div");
        btn.className = "code-more-btn";

        // 图标
        const img = document.createElement("img");
        img.className = "code-more-img";
        img.src = {{ (resources.Get "icons/codeMore.webp").Permalink }};

        btn.appendChild(img);
        moreBox.appendChild(btn);
        block.appendChild(moreBox);

        // 点击事件
        btn.addEventListener("click", () => {
            block.classList.add("code-show");
            moreBox.classList.add("hide");

            // 重新计算目录位置（Stack主题逻辑）
            window.dispatchEvent(new Event('resize'));
        });
    });
}

// 等待 DOM 完全渲染（防止抢 highlight.js 的时机）
document.addEventListener("DOMContentLoaded", initCodeMoreBox);
</script>

<div class="js-Pjax">
  <script>
      (function () {
          // 判断当前是否有文章评论标识

          if (!comment) {
              return
          }
          let script = document.createElement('script');
          // 将对应评论的脚本内容填进去

          script.setAttribute('data-repo', '{{- .repo -}}');
          script.setAttribute('data-repo-id', '{{- .repoID -}}');
          script.setAttribute('data-category', '{{- .category -}}');
          script.setAttribute('data-category-id', '{{- .categoryID -}}');
          script.setAttribute('data-mapping', '{{- default `title` .mapping -}}');
          script.setAttribute('data-strict', '{{- default 0 .strict -}}');
          script.setAttribute('data-reactions-enabled', '{{- default 1 .reactionsEnabled -}}');
          script.setAttribute('data-emit-metadata', '{{- default 0 .emitMetadata -}}');
          script.setAttribute('data-input-position', '{{- default `top` .inputPosition -}}');
          script.setAttribute('data-theme', '{{- default `light` .lightTheme -}}');
          script.setAttribute('data-lang', '{{- default `en` .lang -}}');
          script.setAttribute('data-loading', '{{- .loading -}}');

      })(document);

<script>
  // 修改进度条颜色
  topbar.config({
      barColors: {
          '0': 'rgba(255, 255, 255, 1)', // 进度0%白色
          '1.0': 'rgba(139, 0, 139, 0)' // 进度100%蓝色
      }
  })

  document.addEventListener('pjax:send', () => {
      // 显示顶部进度条
      topbar.show();
  })
    async function renderKaTeX() {
        // 判断当前页面是否有KateX
        let katex = document.querySelector(".math-katex");
        if (!katex) {
            return;
        }
        // 等待函数加载成功后，再执行渲染方法
        while (typeof renderMathInElement !== 'function') {
            await delay(500);
        }        
        // KaTeX渲染方法
        renderMathInElement(document.body, {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
                { left: "\\[", right: "\\]", display: true }
            ],
            ignoredClasses: ["gist"]
        });
    }
    function delay(time) {
        return new Promise(resolve => {
            setTimeout(resolve, time)
        })
    }

    document.addEventListener('pjax:complete', () => {
        window.Stack.init();
        renderKaTeX();
        topbar.hide();
    })
</script>

<script>
  function showHideView() {
      // 判断是否存在vercount标签
      let viewCounts = document.querySelectorAll("#viewCount");
      if (viewCounts.length > 0) {
          // 判断是否为文章页
          let article =  document.querySelector(".article-page");
          if (!article) {
              viewCounts.forEach(ele => {
                  ele.style.display = 'none';
              });
          }
      }
  }
  
  showHideView();
</script>
