<script>
    pjax._handleResponse = pjax.handleResponse;
    pjax.handleResponse = function(responseText, request, href, options) {
        if (request.responseText.match("<html")) {
            if (responseText) {
                // 将新页面的html字符串解析成DOM对象
                let newDom = new DOMParser().parseFromString(responseText, 'text/html');
                // 获取新页面中body的className，并设置回当前页面
                let bodyClass = newDom.body.className;
                document.body.setAttribute("class", bodyClass)
            }
            // 放行，交给pjax自己处理
            pjax._handleResponse(responseText, request, href, options);
        } else {
            // handle non-HTML response here
        }
    }
</script>



<script>
  // 多 CDN fallback,按顺序尝试,任一可用即使用其作为 modelPath
  const cdnBases = [
    "https://pub-fb5f542427074d66a4742ed7d0fcb694.r2.dev/live2d-widget-skyhaibara",
    "https://fastly.jsdelivr.net/gh/skyhaibara/hugo-live2d@master",
    "https://cdn.jsdelivr.net/gh/skyhaibara/hugo-live2d@master",
    "https://gcore.jsdelivr.net/gh/skyhaibara/hugo-live2d@master"
  ];
  const cssPath = {{ (resources.Get "waifu/waifu.css").Permalink }};
  const tipsJsonPath = {{ (resources.Get "waifu/waifu-tips.json").Permalink }};
  const WAIFU_POS_KEY = "waifu-pos";

  let activeCdnBase = cdnBases[0];

  function loadExternalResource(url, type) {
    return new Promise((resolve, reject) => {
      const tag = type === "css"
        ? Object.assign(document.createElement("link"), { rel: "stylesheet", href: url })
        : Object.assign(document.createElement("script"), { src: url });
      tag.onload = () => resolve(url);
      tag.onerror = () => reject(url);
      document.head.appendChild(tag);
    });
  }

  function loadWithFallback(pathSuffix, type) {
    return new Promise((resolve, reject) => {
      const tryAt = (i) => {
        if (i >= cdnBases.length) return reject(new Error("all CDNs failed: " + pathSuffix));
        loadExternalResource(cdnBases[i] + pathSuffix, type)
          .then(u => { activeCdnBase = cdnBases[i]; resolve(u); })
          .catch(() => tryAt(i + 1));
      };
      tryAt(0);
    });
  }

  if (screen.width >= 768) {
    Promise.all([
      loadExternalResource(cssPath, "css"),
      loadWithFallback("/Core/live2dcubismcore.js", "js"),
      loadWithFallback("/live2d-sdk.js", "js"),
      loadWithFallback("/waifu-tips.js", "js")
    ]).then(() => {
      initWidget({
        waifuPath: tipsJsonPath,
        cdnPath: activeCdnBase + "/Resources/",
        tools: ["hitokoto", "express", "switch-model", "photo", "info", "quit"],
        dragEnable: true,
        dragDirection: ["x"]
      });
      bindWaifuPosition();
      waitWaifuReady();
      bindWaifuTips();
    }).catch(err => console.warn("[live2d] init failed:", err));
  }

  // 这个 fork 版的 waifu-tips.js 不读 JSON 里的 mouseover/click 数组(只跑 time/seasons/message),
  // 自己挂事件代理:document.body 上一次性 mouseover + click,匹配 JSON 选择器,复用库自带的 #waifu-tips 气泡元素显示。
  function bindWaifuTips() {
    fetch(tipsJsonPath).then(r => r.json()).then(tips => {
      let lastHoverEl = null;
      let hideTimer = null;

      const pickText = (arr) => {
        const a = Array.isArray(arr) ? arr : [arr];
        return a[Math.floor(Math.random() * a.length)];
      };

      const showTip = (textArr, hostEl) => {
        const el = document.getElementById("waifu-tips");
        if (!el) return;
        let msg = pickText(textArr);
        if (msg.includes("{text}") && hostEl) {
          msg = msg.replace("{text}", (hostEl.textContent || "").trim());
        }
        el.innerHTML = msg;
        el.classList.add("waifu-tips-active");
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => el.classList.remove("waifu-tips-active"), 4000);
      };

      document.body.addEventListener("mouseover", (e) => {
        if (!tips.mouseover) return;
        for (const item of tips.mouseover) {
          try {
            const hit = e.target.closest(item.selector);
            if (hit && hit !== lastHoverEl) {
              lastHoverEl = hit;
              showTip(item.text, hit);
              return;
            }
          } catch (_) {}
        }
      });

      // 完全离开当前 hover 元素时重置,允许再次进入触发
      document.body.addEventListener("mouseout", (e) => {
        if (lastHoverEl && !lastHoverEl.contains(e.relatedTarget)) {
          lastHoverEl = null;
        }
      });

      document.body.addEventListener("click", (e) => {
        if (!tips.click) return;
        for (const item of tips.click) {
          try {
            if (e.target.closest(item.selector)) {
              showTip(item.text, e.target);
              return;
            }
          } catch (_) {}
        }
      });
    }).catch(err => console.warn("[live2d] tips load failed:", err));
  }

  function bindWaifuPosition() {
    let tries = 0;
    const wait = setInterval(() => {
      const waifu = document.getElementById("waifu");
      if (waifu) {
        clearInterval(wait);
        setupWaifuPosition(waifu);
      } else if (++tries > 100) {
        clearInterval(wait);
      }
    }, 100);
  }

  // 桌宠"加载完成才弹出":
  //   监听网络层 — 用 PerformanceObserver 等模型纹理(3 张 .webp)全部下载完。
  //   这是比"等 N 秒"更可靠的信号:无论网速快慢,都精确等到模型资源就绪。
  //   纹理路径匹配模式:`/yangyang.4096/texture_` 命中所有 3 张。
  //   全部加载完后再额外等 800ms,让纹理上传到 GPU + 首帧绘制完成。
  function waitWaifuReady() {
    const TEX_PATH_HINT = "/yangyang.4096/texture_";
    const NEEDED = 3;
    const GPU_UPLOAD_DELAY = 800;
    const SAFETY_TIMEOUT = 30000;
    let textures = 0;
    let done = false;
    let observer = null;

    const finalize = () => {
      if (done) return;
      done = true;
      try { observer && observer.disconnect(); } catch (e) {}
      setTimeout(() => {
        document.body.classList.add("waifu-ready");
        document.getElementById("waifu")?.classList.add("waifu-ready");
      }, GPU_UPLOAD_DELAY);
    };

    // 1. 检查已经加载完的资源(可能脚本启动前纹理就缓存命中了)
    try {
      for (const e of performance.getEntriesByType("resource")) {
        if (e.name.includes(TEX_PATH_HINT)) textures++;
      }
    } catch (e) {}
    if (textures >= NEEDED) { finalize(); return; }

    // 2. 监听新资源加载
    try {
      observer = new PerformanceObserver((list) => {
        for (const e of list.getEntries()) {
          if (e.name.includes(TEX_PATH_HINT)) {
            textures++;
            if (textures >= NEEDED) { finalize(); return; }
          }
        }
      });
      observer.observe({ entryTypes: ["resource"] });
    } catch (e) {
      // PerformanceObserver 不支持,直接走超时兜底
    }

    // 3. 超时兜底:无论检测到与否,30s 后强制显示
    setTimeout(finalize, SAFETY_TIMEOUT);
  }

  function setupWaifuPosition(waifu) {
    // 仅在初次加载时恢复位置(并 clamp 到当前视口),之后让上游库自己处理拖拽
    try {
      const saved = JSON.parse(localStorage.getItem(WAIFU_POS_KEY) || "null");
      if (saved && Number.isFinite(saved.left) && Number.isFinite(saved.top)) {
        const w = 300, h = 300;
        const left = Math.min(Math.max(0, saved.left), Math.max(0, window.innerWidth - w));
        const top = Math.min(Math.max(0, saved.top), Math.max(0, window.innerHeight - h));
        waifu.style.left = left + "px";
        waifu.style.top = top + "px";
      }
    } catch (e) {}

    // 拖完只记录,不重新设置位置 — 避免和库的 offsetLeft/Top 读写冲突
    let dragging = false;
    const onDown = (e) => {
      if (e.target.closest && e.target.closest("#waifu")) dragging = true;
    };
    const onUp = () => {
      if (!dragging) return;
      dragging = false;
      const left = parseFloat(waifu.style.left);
      const top = parseFloat(waifu.style.top);
      if (Number.isFinite(left) && Number.isFinite(top)) {
        try { localStorage.setItem(WAIFU_POS_KEY, JSON.stringify({ left, top })); } catch (e) {}
      }
    };
    document.addEventListener("mousedown", onDown);
    document.addEventListener("mouseup", onUp);
    document.addEventListener("touchstart", onDown, { passive: true });
    document.addEventListener("touchend", onUp);
  }
</script>

<style>
  /* 桌宠加载完才出现:默认整体隐藏 + fade-in 过渡 */
  #waifu {
    opacity: 0 !important;
    pointer-events: none;
    /* 重新声明 transition 把 opacity 加进来,保留库自带的 transform / bottom 过渡 */
    transition: transform .3s ease-in-out, bottom 3s ease-in-out, opacity .55s ease-out !important;
  }

  /* 注:之前在这里加了 #waifu-tips { visibility: hidden !important } 作为"双保险",

  /* Cipher 卡片点击放大 lightbox(Stack 主题的 PhotoSwipe 只匹配 markdown 渲染的图,

  .cipher-lightbox-content {

    /* 文字延迟 0.2s 渐显 —— 让图片先出来,再"轻轻补上"描述 */

  }
  @keyframes fadein-text {

  .cipher-lightbox-caption strong {

  .cipher-lightbox-close {

  @keyframes cipher-fadein {

</style>

<script>
  // Cipher 卡片点击放大功能 — 监听整个文档的 cipher-card 图片点击事件
  (function () {
    function openCipherLightbox(img) {
      const card = img.closest(".cipher-card");
      const caption = card && card.querySelector("figcaption");

      const overlay = document.createElement("div");
      overlay.className = "cipher-lightbox";

      const content = document.createElement("div");
      content.className = "cipher-lightbox-content";
      content.addEventListener("click", e => e.stopPropagation()); // 阻止冒泡到 overlay

      const bigImg = document.createElement("img");
      bigImg.src = img.src;
      bigImg.alt = img.alt || "";
      content.appendChild(bigImg);

      if (caption) {
        const cap = document.createElement("div");
        cap.className = "cipher-lightbox-caption";
        cap.innerHTML = caption.innerHTML;
        content.appendChild(cap);
      }

      const closeBtn = document.createElement("button");
      closeBtn.type = "button";
      closeBtn.className = "cipher-lightbox-close";
      closeBtn.textContent = "×";
      closeBtn.setAttribute("aria-label", "Close");
      overlay.appendChild(closeBtn);

      overlay.appendChild(content);

      const close = () => {
        overlay.remove();
        document.removeEventListener("keydown", escHandler);
      };
      const escHandler = e => { if (e.key === "Escape") close(); };

      overlay.addEventListener("click", close);
      closeBtn.addEventListener("click", close);
      document.addEventListener("keydown", escHandler);

      document.body.appendChild(overlay);
    }

    // 用事件委托:监听 document,捕获 cipher-card 内 img 的点击
    // 这样 pjax 切页之后无需重新绑定
    document.addEventListener("click", e => {
      const img = e.target.closest(".cipher-card img");
      if (img) {
        e.preventDefault();
        openCipherLightbox(img);
      }
    });

    // 主页文章卡整张可点击 — 用 JS 代理,不用 CSS overlay
    // 优点:overlay 会盖住所有子元素的 hover 事件,导致 waifu 提示词识别不到具体元素(日期/封面/分类)
    // 这里只在"点击落在非链接的空白处"时,模拟点击该卡的标题链接(标题链接 PJAX 已经接管,会走 pjax 跳转)
    document.addEventListener("click", e => {
      const article = e.target.closest(".article-list article");
      if (!article) return;
      if (e.target.closest("a")) return;  // 已经在链接上,放行原始行为
      const titleLink = article.querySelector(".article-title a");
      if (titleLink) titleLink.click();
    });
  })();
</script>

<script>
    function initTocHide() {
        // 判断是否存在文章目录
        let toc = document.querySelector(".widget--toc");
        if (!toc) {
            return;
        }
        // 监听滚动
        window.addEventListener('scroll', function() {
            //清除class值
            let openUl = document.querySelectorAll(".open");
            if (openUl.length > 0) {
              openUl.forEach((ul) => {
                ul.classList.remove("open")
              })
            }
            // 获取active-class
            let currentLi = document.querySelector(".active-class");
            if (!currentLi) {
                return
            }
            // 展示子ul
            if (currentLi.children.length > 1) {
                currentLi.children[1].classList.add("open")
            }
            // 展示父ul
            let ul = currentLi.parentElement;
            do {
                ul.classList.add("open");
                ul = ul.parentElement.parentElement
            } while (ul !== undefined && (ul.localName === 'ul' || ul.localName === 'ol'))
        });
    }
    initTocHide()
</script>

<script>
    /**
     * 滚动回顶部初始化
     */
    function initScrollTop() {
        let rightSideBar = document.querySelector(".right-sidebar");
        if (!rightSideBar) {
            return;
        }
        // 添加返回顶部按钮到右侧边栏
        let btn = document.createElement("div");
        btn.id = "backTopBtn";
        btn.onclick = backToTop
        rightSideBar.appendChild(btn)
        // 滚动监听
        window.addEventListener('scroll', function() {
            // 当网页向下滑动 20px 出现"返回顶部" 按钮

                btn.style.display = "block";
            } else {

            }
        });
    }

    function backToTop(){
        window.scrollTo({ top: 0, behavior: "smooth" })
    }

</script>

<style>
/* 代码块容器：基础样式 */
.highlight {
    position: relative;
    transition: height .35s ease;
}

/* 只有 JS 判定为"超长"的代码块(>400px)才会被标记 .code-more-init
   并默认折叠到 200px;短代码块保持自然高度,避免底部出现空白 */
.highlight.code-more-init {
    height: 200px;
    overflow: hidden;
}

/* 展开状态：高度由 JS 写入精确值 */
.highlight.code-more-init.code-show {
    height: auto;
}

/* 渐隐区域：主题自适应 */

.code-more-btn:hover {

/* 折叠按钮 —— 位于 Copy 按钮左侧 8px,样式跟 Copy 完全对齐 */

    position: absolute;
    top: calc(var(--card-padding));

<script>
function initCodeMoreBox() {
    const codeBlocks = document.querySelectorAll(".highlight");

    codeBlocks.forEach(block => {
        // 内容不够长，不需要折叠
        if (block.scrollHeight <= 400) return;

        // 避免重复初始化
        if (block.classList.contains("code-more-init")) return;
        block.classList.add("code-more-init");

        // 展开盒子
        const moreBox = document.createElement("div");
        moreBox.className = "code-more-box";

        // 按钮
        const btn = document.createElement("div");
        btn.className = "code-more-btn";

        // 图标
        const img = document.createElement("img");
        img.className = "code-more-img";
        img.src = {{ (resources.Get "icons/codeMore.webp").Permalink }};

        btn.appendChild(img);
        moreBox.appendChild(btn);
        block.appendChild(moreBox);

        // 折叠按钮(Copy 左侧),展开后才可点击
        const foldBtn = document.createElement("button");
        foldBtn.type = "button";
        foldBtn.className = "codeFoldButton";
        foldBtn.textContent = "Fold";
        block.appendChild(foldBtn);

        // 展开:先写入精确目标高度再触发 transition,结束后改为 auto
        btn.addEventListener("click", () => {
            const target = block.scrollHeight;
            block.style.height = target + 'px';
            moreBox.classList.add("hide");
            block.addEventListener('transitionend', () => {
                block.classList.add("code-show");
                block.style.height = '';
                window.dispatchEvent(new Event('resize'));
            }, { once: true });
        });

        // 折叠:height: auto 不能直接 transition,先锁定为像素值再过渡到 200px
        foldBtn.addEventListener("click", () => {
            block.style.height = block.scrollHeight + 'px';
            void block.offsetHeight;              // 强制 reflow,让浏览器接受起点像素值
            block.classList.remove("code-show");
            block.style.height = '200px';         // 触发 transition
            block.addEventListener('transitionend', () => {
                block.style.height = '';          // 清掉 inline,交给 CSS 的 height:200px
                moreBox.classList.remove("hide"); // 重新显示底部"展开"小白框
                // 把视口对齐到代码块顶部,避免折叠后用户卡在中间不知道发生了什么
                block.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, { once: true });
        });
    });
}

<script>
  // 修改进度条颜色
  topbar.config({
      barColors: {
          '0': 'rgba(255, 255, 255, 1)', // 进度0%白色
          '1.0': 'rgba(139, 0, 139, 0)' // 进度100%蓝色
      }
  })

  document.addEventListener('pjax:send', () => {
      // 显示顶部进度条
      topbar.show();
  })
    async function renderKaTeX() {
        // 判断当前页面是否有KateX
        let katex = document.querySelector(".math-katex");
        if (!katex) {
            return;
        }
        // 等待函数加载成功后，再执行渲染方法
        while (typeof renderMathInElement !== 'function') {
            await delay(500);
        }        
        // KaTeX渲染方法
        renderMathInElement(document.body, {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
                { left: "\\[", right: "\\]", display: true }
            ],
            ignoredClasses: ["gist"]
        });
    }
    function delay(time) {
        return new Promise(resolve => {
            setTimeout(resolve, time)
        })
    }

    document.addEventListener('pjax:complete', () => {
        window.Stack.init();
        renderKaTeX();
        topbar.hide();
    })
</script>

<script>
  // 阅读次数 — 完全自己实现,不引入 vercount 自带的 IIFE 脚本。
  // 原因:
  //   1. vercount IIFE 只在初次 DOMContentLoaded 跑一次,PJAX 跳页后不重跑
  //   2. vercount 用 getElementById,主页多张卡同 ID 时只更新第一个,且写的是当前 URL 的 PV 不是各卡文章的 PV
  //   3. 同时挂两套(vercount + 我们)会双重 POST,把 site_pv 翻倍累加
  //
  // 实现:querySelectorAll 找所有 #viewCount,按所在 <article> 的标题链接得到每篇文章的真实 URL,
  // 分别调 vercount events API,把对应卡片的 span 写成各自的 page_pv。
  function refreshAllViewCounts() {
    const isSinglePage = document.body.classList.contains("article-page");
    const viewCounts = document.querySelectorAll("#viewCount");

    viewCounts.forEach(vc => {
      const span = vc.querySelector("#vercount_value_page_pv");
      if (!span) return;

      let url;
      if (isSinglePage) {
        url = location.href;
      } else {
        const article = vc.closest("article");
        const titleLink = article && article.querySelector(".article-title a");
        if (!titleLink) return;
        url = new URL(titleLink.getAttribute("href"), location.origin).href;
      }

      fetch("https://events.vercount.one/api/v2/log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: url, isNewUv: false })
      })
        .then(r => r.json())
        .then(j => {
          if (j && j.status === "success" && j.data && j.data.page_pv != null) {
            span.textContent = String(j.data.page_pv);
          }
        })
        .catch(() => {});
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", refreshAllViewCounts);
  } else {
    refreshAllViewCounts();
  }
  document.addEventListener("pjax:complete", refreshAllViewCounts);
</script>
